baseURL: "https://rem.sidv.dev/"
languageCode: "en-us"
title: "rem — CLI for macOS Reminders"
theme: "rem-docs"

params:
  description: "rem is a fast command-line interface for macOS Reminders. Built with Go and EventKit via cgo, it reads and writes reminders in under 200ms — faster than any AppleScript or JXA approach. Supports natural language dates, JSON/CSV export, interactive mode, and AI agent skills."
  author: "Siddharth Verma"
  github: "https://github.com/BRO3886/rem"
  ogImage: "/images/og-image.png"
  keywords:
    - macOS Reminders CLI
    - rem CLI
    - command line reminders macOS
    - Go CLI tool macOS
    - EventKit CLI
    - Apple Reminders terminal
    - macOS productivity tool
    - reminder management terminal
    - rem go-eventkit
    - macOS reminders command line

markup:
  highlight:
    style: github-dark
    lineNos: false
    guessSyntax: true
  goldmark:
    renderer:
      unsafe: true

menu:
  main:
    - name: "Getting Started"
      url: "/docs/getting-started/"
      weight: 1
    - name: "Commands"
      url: "/docs/commands/"
      weight: 2
    - name: "Architecture"
      url: "/docs/architecture/"
      weight: 3
    - name: "go-eventkit"
      url: "https://github.com/BRO3886/go-eventkit"
      weight: 4
    - name: "Performance"
      url: "/docs/performance/"
      weight: 5
    - name: "GitHub"
      url: "https://github.com/BRO3886/rem"
      weight: 6

mediaTypes:
  text/markdown:
    suffixes:
      - md

outputFormats:
  MD:
    mediaType: text/markdown
    baseName: index
    isPlainText: true

outputs:
  home:
    - HTML
    - RSS
  page:
    - HTML
    - MD
  section:
    - HTML
    - MD

sitemap:
  changefreq: weekly
  priority: 0.5

frontmatter:
  lastmod:
    - lastmod
    - :git
    - date
    - publishDate

enableRobotsTXT: true
